<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Green SM — Driver Partner</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --ink: #0A2A2B;
      --teal: #12A3A9;
      --teal-2: #2DCCD3;
      --teal-deep: #0E8C91;
      --mint-1: #EFFAFA;
      --mint-2: #F7FDFD;
      --yellow: #FFCA00;
      --yellow-soft: #FFE283;
      --wa: #25D366;
      --body: #3C5153;
      --card-border: #DCF0F0;
      --shadow: 0 12px 30px rgba(10, 42, 43, 0.10);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      font-family: "Be Vietnam Pro", system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #d9e9e9;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    body { display: flex; justify-content: center; }

    /* ---- the phone screen (no bezel) ---- */
    .frame {
      position: relative;
      width: 100%;
      max-width: 390px;
      height: 100dvh;
      max-height: 900px;
      margin: 0 auto;
      overflow: hidden;
      background: linear-gradient(180deg, #EFFAFA 0%, #F7FDFD 55%, #FFFFFF 100%);
      box-shadow: 0 20px 60px rgba(10, 42, 43, 0.18);
    }
    .scroll {
      height: 100%;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .scroll::-webkit-scrollbar { display: none; }

    /* ---- status bar ---- */
    .statusbar {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 22px 8px;
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
      background: rgba(239, 250, 250, 0.72);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
    }
    .statusbar .sb-icons { display: flex; align-items: center; gap: 6px; }
    .statusbar svg { display: block; }

    /* ---- header ---- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px 6px;
    }
    .logo { height: 30px; width: auto; }
    .hamburger {
      display: flex;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: 0;
      padding: 6px;
      cursor: pointer;
    }
    .hamburger span {
      width: 24px;
      height: 2.5px;
      border-radius: 3px;
      background: var(--ink);
    }

    /* ---- hero ---- */
    .hero {
      position: relative;
      text-align: center;
      padding: 14px 20px 4px;
    }
    .hero::before {
      content: "";
      position: absolute;
      z-index: 0;
      top: -70px;
      left: 50%;
      transform: translateX(-50%);
      width: 460px;
      height: 340px;
      background: radial-gradient(closest-side, rgba(45, 204, 211, 0.28), rgba(45, 204, 211, 0) 70%);
      pointer-events: none;
    }
    .hero > * { position: relative; z-index: 1; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 15px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid #CFEDED;
      color: #0C6E73;
      font-size: 12.5px;
      font-weight: 600;
      line-height: 1;
      box-shadow: 0 2px 10px rgba(12, 110, 115, 0.06);
    }
    .badge .pulse {
      position: relative;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--teal-2);
      flex: none;
    }
    .badge .pulse::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--teal-2);
      animation: pulse 1.8s ease-out infinite;
    }
    @keyframes pulse {
      0%   { transform: scale(1);   opacity: 0.7; }
      100% { transform: scale(3.2); opacity: 0; }
    }

    .headline {
      margin-top: 16px;
      font-size: 34px;
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: -0.02em;
      color: var(--ink);
    }
    .headline .teal { color: var(--teal-deep); }

    .subhead {
      margin: 12px auto 0;
      max-width: 30ch;
      font-size: 15.5px;
      line-height: 1.5;
      font-weight: 400;
      color: var(--body);
    }
    .hl {
      background: linear-gradient(transparent 60%, var(--yellow-soft) 60%);
      color: var(--ink);
      font-weight: 700;
      padding: 0 2px;
    }

    .cta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      width: 100%;
      margin-top: 20px;
      padding: 16px 22px;
      border-radius: 999px;
      background: var(--teal);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 12px 26px rgba(18, 163, 169, 0.32);
    }
    .cta:active { transform: translateY(1px); }
    .cta svg { width: 18px; height: 18px; }

    /* ---- carousel ---- */
    .carousel {
      position: relative;
      height: 250px;
      margin: 22px 20px 0;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      background: #0A2A2B;
    }
    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.9s ease;
    }
    .slide.active { opacity: 1; }
    .slide img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    /* India Gate slide: show the WHOLE image (all 3 cars + monument, no half
       cars) via contain, sitting on a blurred fill so there are no empty bars */
    .slide.india::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url('assets/images/hero-latest.jpg') center/cover no-repeat;
      filter: blur(16px) brightness(0.65);
      transform: scale(1.2);
    }
    .slide.india img {
      position: relative;
      object-fit: contain;
    }
    .dots {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 12px;
      z-index: 3;
      display: flex;
      justify-content: center;
      gap: 6px;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.55);
      transition: width 0.45s ease, background 0.45s ease;
    }
    .dot.active { width: 22px; background: var(--teal-2); }

    /* ---- stat + chips ---- */
    .stats { padding: 16px 20px 26px; }
    .stat-wide {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 16px;
      border-radius: 16px;
      background: #fff;
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
    }
    .stat-ic {
      flex: none;
      width: 46px;
      height: 46px;
      border-radius: 13px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--teal-2), var(--teal));
      color: #fff;
    }
    .stat-ic svg { width: 24px; height: 24px; }
    .stat-amt { font-size: 20px; font-weight: 800; color: var(--ink); line-height: 1.1; }
    .stat-sub { font-size: 13px; color: var(--body); font-weight: 500; margin-top: 2px; }

    .chips {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }
    .chip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 13px 10px;
      border-radius: 14px;
      background: #fff;
      border: 1px solid var(--card-border);
      box-shadow: 0 8px 20px rgba(10, 42, 43, 0.07);
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
    }
    .chip .d { width: 9px; height: 9px; border-radius: 50%; flex: none; }
    .chip .d.teal { background: var(--teal-2); }
    .chip .d.yellow { background: var(--yellow); }

    /* ---- floating whatsapp (fixed within the screen) ---- */
    .wa {
      position: absolute;
      right: 16px;
      bottom: 20px;
      z-index: 40;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--wa);
      box-shadow: 0 10px 24px rgba(37, 211, 102, 0.45);
      text-decoration: none;
    }
    .wa svg { width: 30px; height: 30px; fill: #fff; }
  </style>
</head>
<body>
  <div class="frame">
    <div class="scroll">

      <!-- status bar -->
      <div class="statusbar">
        <span>9:41</span>
        <span class="sb-icons">
          <!-- signal -->
          <svg width="18" height="12" viewBox="0 0 18 12" fill="none">
            <rect x="0"  y="8" width="3" height="4"  rx="1" fill="#0A2A2B"/>
            <rect x="5"  y="5" width="3" height="7"  rx="1" fill="#0A2A2B"/>
            <rect x="10" y="2" width="3" height="10" rx="1" fill="#0A2A2B"/>
            <rect x="15" y="0" width="3" height="12" rx="1" fill="#0A2A2B" opacity="0.35"/>
          </svg>
          <!-- wifi -->
          <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
            <path d="M8 10.5a1.3 1.3 0 100-2.6 1.3 1.3 0 000 2.6z" fill="#0A2A2B"/>
            <path d="M3.2 5.6a7 7 0 019.6 0" stroke="#0A2A2B" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M1 3.2a10.2 10.2 0 0114 0" stroke="#0A2A2B" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <!-- battery -->
          <svg width="26" height="13" viewBox="0 0 26 13" fill="none">
            <rect x="0.7" y="0.7" width="22" height="11.6" rx="3" stroke="#0A2A2B" stroke-width="1.2"/>
            <rect x="2.4" y="2.4" width="17" height="8.2" rx="1.6" fill="#0A2A2B"/>
            <rect x="24" y="4" width="2" height="5" rx="1" fill="#0A2A2B"/>
          </svg>
        </span>
      </div>

      <!-- header -->
      <div class="header">
        <img class="logo" src="https://w.ladicdn.com/s500x350/682b14dd6c648c0012c0d0d5/logo-phi-20250730133343-btzkv.png" alt="Green SM" />
        <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
      </div>

      <!-- hero -->
      <section class="hero">
        <span class="badge"><span class="pulse"></span>Green SM Driver Partner Community</span>
        <h1 class="headline">Driver Nahi,<br><span class="teal">Partner Bano!</span></h1>
        <p class="subhead">Brand-new EV cars ke saath kamao <span class="hl">&#8377;50,000+*</span> tak har mahine.</p>
        <a class="cta" href="#">Aaj Hi Join Karein
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </a>
      </section>

      <!-- carousel -->
      <div class="carousel" id="carousel">
        <div class="slide india active"><img src="assets/images/hero-latest.jpg" alt="India Gate ke saamne Green SM ki EV cars"></div>
        <div class="slide"><img src="assets/images/event-01.jpg" alt="Green SM Driver Partner community event"></div>
        <div class="slide"><img src="assets/images/hero-driver-car.png" alt="Green SM driver apni EV car ke saath"></div>
        <div class="dots">
          <span class="dot active"></span><span class="dot"></span><span class="dot"></span>
        </div>
      </div>

      <!-- stats -->
      <div class="stats">
        <div class="stat-wide">
          <span class="stat-ic">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2.5" y="6" width="19" height="12" rx="2.5"/>
              <circle cx="12" cy="12" r="2.6"/>
              <path d="M6 12h.01M18 12h.01"/>
            </svg>
          </span>
          <div>
            <div class="stat-amt">&#8377;50,000+*</div>
            <div class="stat-sub">har mahine kamai</div>
          </div>
        </div>
        <div class="chips">
          <div class="chip"><span class="d teal"></span>100% Electric</div>
          <div class="chip"><span class="d yellow"></span>Insurance</div>
        </div>
      </div>

    </div>

    <!-- floating whatsapp -->
    <a class="wa" href="#" aria-label="WhatsApp">
      <svg viewBox="0 0 24 24"><path d="M17.5 14.4c-.3-.15-1.77-.87-2.04-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.65.07-.3-.15-1.26-.46-2.4-1.48-.89-.79-1.49-1.77-1.66-2.07-.17-.3-.02-.46.13-.61.14-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.67-1.62-.92-2.22-.24-.58-.49-.5-.67-.51h-.57c-.2 0-.52.07-.8.37-.27.3-1.04 1.02-1.04 2.48s1.07 2.88 1.22 3.08c.15.2 2.1 3.2 5.08 4.49.71.31 1.26.49 1.7.63.71.23 1.36.2 1.87.12.57-.08 1.77-.72 2.02-1.42.25-.7.25-1.3.17-1.42-.07-.13-.27-.2-.57-.35z"/><path d="M12 2a10 10 0 00-8.5 15.28L2 22l4.85-1.47A10 10 0 1012 2zm0 18.2a8.2 8.2 0 01-4.18-1.14l-.3-.18-2.88.87.86-2.8-.2-.31A8.2 8.2 0 1112 20.2z"/></svg>
    </a>
  </div>

  <script>
    (function () {
      var slides = Array.prototype.slice.call(document.querySelectorAll('#carousel .slide'));
      var dots = Array.prototype.slice.call(document.querySelectorAll('#carousel .dot'));
      var i = 0;
      var PER = 5500; // 3 x 5.5s = ~16.5s loop
      setInterval(function () {
        slides[i].classList.remove('active');
        dots[i].classList.remove('active');
        i = (i + 1) % slides.length;
        slides[i].classList.add('active');
        dots[i].classList.add('active');
      }, PER);
    })();
  </script>
</body>
</html>
